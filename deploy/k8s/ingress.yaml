apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reserveflow
  namespace: reserveflow
spec:
  rules:
    - host: reserveflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 8080
