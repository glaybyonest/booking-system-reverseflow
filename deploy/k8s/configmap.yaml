apiVersion: v1
kind: ConfigMap
metadata:
  name: reserveflow-config
  namespace: reserveflow
data:
  APP_ENV: production
  HTTP_PORT: "8080"
  REDIS_ADDR: redis:6379
  REDIS_DB: "0"
  KAFKA_BROKERS: kafka:9092
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 720h
  HOLD_TTL: 10m
  SEATMAP_CACHE_TTL: 30s
  LOG_LEVEL: info
