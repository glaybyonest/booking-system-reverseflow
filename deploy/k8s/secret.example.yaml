apiVersion: v1
kind: Secret
metadata:
  name: reserveflow-secret
  namespace: reserveflow
type: Opaque
stringData:
  DATABASE_URL: postgres://reserveflow:reserveflow@postgres:5432/reserveflow?sslmode=disable
  REDIS_PASSWORD: ""
  JWT_ACCESS_SECRET: replace-with-strong-access-secret
  JWT_REFRESH_SECRET: replace-with-strong-refresh-secret
  POSTGRES_DB: reserveflow
  POSTGRES_USER: reserveflow
  POSTGRES_PASSWORD: reserveflow
