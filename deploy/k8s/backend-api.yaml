apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: reserveflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          image: reserveflow-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["/app/backend-api"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: reserveflow-config
            - secretRef:
                name: reserveflow-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: reserveflow
spec:
  selector:
    app: backend-api
  ports:
    - port: 8080
      targetPort: 8080
