apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: reserveflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: reserveflow-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_API_URL
              value: http://backend-api:8080
            - name: NEXT_PUBLIC_APP_NAME
              value: ReserveFlow
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: reserveflow
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
